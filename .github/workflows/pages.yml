# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3" # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # install gems in docs/ then build
        run: |
          cd docs
          bundle install
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Render static model geometry
        # Pre-render the models used by `static` surfaces to OFF (+ a PNG poster)
        # with the OpenSCAD CLI. deploy-configure (the Action) stays dependency-
        # free, so the render happens here. Drop this step if you publish no
        # static surfaces.
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad xvfb
          mkdir -p rendered
          # Input file first: `--render` takes an optional value and would
          # otherwise swallow a trailing filename.
          # OFF is a headless CGAL export; the PNG poster needs an OpenGL context,
          # so render it under xvfb (a virtual display) on the headless runner.
          openscad models/demo.scad -o rendered/demo.off
          xvfb-run -a openscad models/demo.scad -o rendered/demo.png --imgsize=1000,750 --viewall --autocenter --render

      - name: Assemble OpenSCAD model surfaces
        # Publishes the models declared in openscad-publish.yml into the built
        # Jekyll site (docs/_site), served same-origin. Remove this step (and
        # openscad-publish.yml) if the site embeds no models.
        uses: CameronBrooks11/openscad-web@v0
        with:
          config: ./openscad-publish.yml

      - name: Upload artifact
        # Automatically uploads the generated docs/_site folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
