version: 2
updates:
  - package-ecosystem: bundler
    directory: /docs # the Jekyll Gemfile lives in docs/, not the repo root
    schedule:
      interval: daily
    allow:
      - dependency-type: direct
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
      time: "10:00"
    open-pull-requests-limit: 10
